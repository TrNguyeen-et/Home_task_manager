<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo hoặc tham gia nhà - Home Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fafafa; }
        .bg-grid { background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,.03) 1px, transparent 0); background-size: 32px 32px; }
        @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateY(-20px); opacity: 0; } }
        .toast-enter { animation: toastIn 0.3s ease-out forwards; }
        .toast-out { animation: toastOut 0.2s ease-in forwards; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .float-anim { animation: float 3s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-grid">

    <div id="toastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <div class="max-w-lg w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-neutral-900 text-white mb-5 shadow-lg float-anim">
                <i class="fa-solid fa-house-chimney text-2xl"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-neutral-900 tracking-tight">Chào mừng bạn!</h1>
            <p class="text-neutral-500 text-sm mt-2">Tạo nhà mới hoặc tham gia nhà đã có</p>
            <p class="text-neutral-400 text-xs mt-1" id="userGreeting">Đang tải...</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <!-- Tạo nhà mới -->
            <div class="bg-white rounded-2xl shadow-lg shadow-neutral-200/50 border border-neutral-100 p-6 hover:shadow-xl transition-shadow">
                <div class="w-12 h-12 bg-neutral-100 rounded-xl flex items-center justify-center text-neutral-500 mb-4">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <h2 class="font-bold text-neutral-800 mb-1">Tạo nhà mới</h2>
                <p class="text-xs text-neutral-400 mb-4">Bạn trở thành Admin. Nhận mã mời để chia sẻ cho người khác.</p>
                
                <div id="createForm" class="hidden space-y-3">
                    <input type="text" id="houseName" placeholder="VD: Nhà gia đình Nguyễn" class="w-full px-4 py-3 border border-neutral-200 rounded-xl focus:ring-2 focus:ring-neutral-900 outline-none text-sm">
                    <button onclick="createHouse()" id="createBtn" class="w-full bg-neutral-900 text-white font-bold py-3 rounded-xl hover:bg-neutral-800 flex items-center justify-center gap-2 text-sm disabled:opacity-50 transition-colors">
                        <span id="createBtnText">Tạo nhà</span>
                        <i id="createSpin" class="fa-solid fa-circle-notch spin text-xs hidden"></i>
                    </button>
                    
                    <div id="createResult" class="hidden bg-emerald-50 rounded-xl p-5 border border-emerald-100 text-center">
                        <p class="text-xs text-emerald-600 font-semibold mb-2">Nhấn mã này gửi cho thành viên tham gia:</p>
                        <p class="text-3xl font-extrabold text-emerald-700 tracking-[0.3em]" id="joinCodeDisplay">------</p>
                        <button onclick="copyCode()" class="mt-3 text-xs text-emerald-600 hover:text-emerald-700 font-bold flex items-center gap-1.5 mx-auto"><i class="fa-regular fa-copy"></i> Sao chép mã</button>
                    </div>
                </div>
                <button onclick="document.getElementById('createForm').classList.toggle('hidden')" id="createToggle" class="w-full bg-neutral-100 text-neutral-700 font-bold py-3 rounded-xl hover:bg-neutral-200 transition-colors text-sm flex items-center justify-center gap-2">
                    Bắt đầu
                </button>
            </div>

            <!-- Tham gia nhà -->
            <div class="bg-white rounded-2xl shadow-lg shadow-neutral-200/50 border border-neutral-100 p-6 hover:shadow-xl transition-shadow">
                <div class="w-12 h-12 bg-neutral-100 rounded-xl flex items-center justify-center text-neutral-500 mb-4">
                    <i class="fa-solid fa-right-to-bracket text-xl"></i>
                </div>
                <h2 class="font-bold text-neutral-800 mb-1">Tham gia nhà</h2>
                <p class="text-xs text-neutral-400 mb-4">Nhập mã 6 ký tự mà quản trị viên gửi cho bạn.</p>
                
                <div id="joinForm" class="hidden space-y-3">
                    <input type="text" id="joinCode" maxlength="6" placeholder="VD: ABC123" class="w-full px-4 py-3 border border-neutral-200 rounded-xl focus:ring-2 focus:ring-neutral-900 outline-none text-sm text-center text-lg font-bold tracking-[0.3em] uppercase" oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'')">
                    <button onclick="joinHouse()" id="joinBtn" class="w-full bg-neutral-900 text-white font-bold py-3 rounded-xl hover:bg-neutral-800 flex items-center justify-center gap-2 text-sm disabled:opacity-50">
                        <span id="joinBtnText">Tham gia</span>
                        <i id="joinSpin" class="fa-solid fa-circle-notch spin text-xs hidden"></i>
                    </button>
                </div>
                <button onclick="document.getElementById('joinForm').classList.toggle('hidden')" id="joinToggle" class="w-full bg-neutral-100 text-neutral-700 font-bold py-3 rounded-xl hover:bg-neutral-200 transition-colors text-sm flex items-center justify-center gap-2">
                    Nhập mã
                </button>
            </div>
        </div>

        <div class="text-center mt-6">
            <button onclick="logout()" class="text-neutral-400 hover:text-red-500 text-xs font-medium transition-colors"><i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Đăng xuất</button>
        </div>
    </div>

<script>
    let mySupabase, currentUser = null;
    const API = 'https://home-task-manager.onrender.com';

    function showToast(msg, type = 'info') {
        const c = document.getElementById('toastContainer');
        const styles = { error: 'bg-red-500', success: 'bg-emerald-500', info: 'bg-neutral-800', warning: 'bg-amber-500' };
        const icons = { error: 'fa-circle-exclamation', success: 'fa-circle-check', info: 'fa-circle-info', warning: 'fa-triangle-exclamation' };
        const t = document.createElement('div');
        t.className = `pointer-events-auto ${styles[type] || 'bg-neutral-800'} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-enter text-sm font-medium`;
        t.innerHTML = `<i class="fa-solid ${icons[type] || 'fa-circle-info'} text-xs opacity-70"></i><span class="flex-1">${msg}</span><button onclick="this.parentElement.remove()" class="opacity-50 hover:opacity-100"><i class="fa-solid fa-xmark text-xs"></i></button>`;
        c.appendChild(t);
        setTimeout(() => { t.classList.add('toast-out'); setTimeout(() => t.remove(), 200); }, 3500);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const r = await fetch(`${API}/api/config`);
            const cfg = await r.json();
            mySupabase = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_KEY);
            await checkAuth();
        } catch (e) { showToast('Lỗi kết nối!', 'error'); }
    });

    async function checkAuth() {
        const { data: { user } } = await mySupabase.auth.getUser();
        if (!user) return window.location.href = 'login.html';
        
        const { data: profile } = await mySupabase.from('profiles').select('*').eq('id', user.id).single();
        if (!profile) return window.location.href = 'login.html';
        
        // *** FIX: Nếu đã có nhà → vào thẳng dashboard ***
        if (profile.household_id) {
            window.location.href = profile.role === 'admin' ? 'admin_dashboard.html' : 'user_dashboard.html';
        }
        
        // Chưa có nhà → hiện onboarding
        currentUser = profile;
        document.getElementById('userGreeting').innerText = `Xin chào, ${profile.full_name}!`;
    }

    async function createHouse() {
        const name = document.getElementById('houseName').value.trim();
        if (!name) return showToast('Nhập tên nhà!', 'warning');
        
        const btn = document.getElementById('createBtn');
        btn.disabled = true;
        document.getElementById('createBtnText').classList.add('hidden');
        document.getElementById('createSpin').classList.remove('hidden');
        
        try {
            const r = await fetch(`${API}/api/households`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, user_id: currentUser.id })
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.detail || 'Lỗi tạo nhà!');
            
            // *** FIX: ĐỢI 2 GIÂY, FETCH LẠI PROFILE ĐỂ XÁC MINH ***
            await new Promise(r => setTimeout(r, 1500)); // Đợi API xử lý xong
            
            const { data: profile } = await mySupabase
                .from('profiles')
                .select('role, household_id')
                .eq('id', currentUser.id)
                .single();
            
            // Kiểm tra xem profile đã được cập nhật chưa
            if (!profile.household_id || profile.role !== 'admin') {
                throw new Error('Cập nhật profile thất bại! Thử đăng xuất và đăng nhập lại.');
            }
            
            // Mới redirect
            document.getElementById('createToggle').classList.add('hidden');
            document.getElementById('createForm').classList.add('hidden');
            document.getElementById('createResult').classList.remove('hidden');
            document.getElementById('joinCodeDisplay').innerText = d.join_code;
            
            showToast('Đã tạo nhà! Bạn là Admin.', 'success');
            setTimeout(() => { window.location.href = 'admin_dashboard.html'; }, 2000);
            
        } catch (err) {
            showToast('Lỗi: ' + err.message, 'error');
            btn.disabled = false;
            document.getElementById('createBtnText').classList.remove('hidden');
            document.getElementById('createSpin').classList.add('hidden');
        }
    }

    function copyCode() {
        const code = document.getElementById('joinCodeDisplay').innerText;
        navigator.clipboard.writeText(code).then(() => showToast('Đã sao chép mã: ' + code, 'success')).catch(() => showToast('Lỗi sao chép!', 'error'));
    }

    async function joinHouse() {
        const code = document.getElementById('joinCode').value.trim();
        if (!code || code.length !== 6) return showToast('Nhập đúng 6 ký tự!', 'warning');
        
        const btn = document.getElementById('joinBtn');
        btn.disabled = true;
        document.getElementById('joinBtnText').classList.add('hidden');
        document.getElementById('joinSpin').classList.remove('hidden');
        
        try {
            const r = await fetch(`${API}/api/households/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ join_code: code, user_id: currentUser.id })
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.detail || 'Mã không tồn tại!');
            
            // *** FIX: ĐỢI 2 GIÂY, FETCH LẠI PROFILE ***
            await new Promise(r => setTimeout(r, 1500));
            
            const { data: profile } = await mySupabase
                .from('profiles')
                .select('role, household_id')
                .eq('id', currentUser.id)
                .single();
            
            if (!profile.household_id) {
                throw new Error('Cập nhật thất bại!');
            }
            
            showToast(`Đã tham gia ${d.household_name || 'nhà'}!`, 'success');
            setTimeout(() => { window.location.href = 'user_dashboard.html'; }, 2000);
            
        } catch (err) {
            showToast('Lỗi: ' + err.message, 'error');
            btn.disabled = false;
            document.getElementById('joinBtnText').classList.remove('hidden');
            document.getElementById('joinSpin').classList.add('hidden');
        }
    }

    async function logout() {
        await mySupabase.auth.signOut();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
