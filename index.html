<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Việc Nhà AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col items-center py-12">

    <div class="w-full max-w-4xl px-4">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 text-indigo-600 mb-4 shadow-sm">
                <i class="fa-solid fa-house-chimney-user text-3xl"></i>
            </div>
            <h1 class="text-4xl font-bold tracking-tight text-slate-900">Chia Việc Thông Minh</h1>
            <p class="text-slate-500 mt-2">Sử dụng thuật toán để cân bằng thời gian làm việc nhà</p>
        </div>

        <div class="glass-card rounded-2xl shadow-sm p-6 mb-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="w-full sm:w-auto">
                <label class="block text-sm font-medium text-slate-600 mb-1">Ngày phân công</label>
                <input type="date" id="dateInput" class="w-full sm:w-auto px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            <button onclick="runAlgorithm()" id="runBtn" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all duration-200 flex items-center justify-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Phân Công Tự Động
            </button>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-2"></i>
            <p class="text-slate-500 animate-pulse">AI đang tính toán...</p>
        </div>

        <div id="resultArea" class="hidden opacity-0 transition-opacity duration-500">
            
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-chart-pie text-indigo-500"></i> Khối lượng công việc
            </h2>
            
            <div id="workloadGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                </div>

            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-list-check text-indigo-500"></i> Chi tiết phân công
            </h2>
            
            <div class="glass-card rounded-2xl shadow-sm overflow-hidden">
                <ul id="taskList" class="divide-y divide-slate-100">
                    </ul>
            </div>
        </div>
    </div>

    <script>
        // MẢNG ÁNH XẠ TỪ DATABASE CỦA RIÊNG BẠN (Dựa trên UUID bạn cung cấp)
        const userMap = {
            "bd944a05-c34e-447f-bc25-e2101db858fd": { name: "Quản trị viên", avatar: "👨‍💻", color: "text-blue-600", bg: "bg-blue-50" },
            "0b68f773-96b1-409e-b9ff-6e90c3311d02": { name: "Thành viên 1", avatar: "👩‍🍳", color: "text-emerald-600", bg: "bg-emerald-50" },
            "d4e3b72b-206a-479b-9388-196357dd6b88": { name: "Thành viên 2", avatar: "🧑‍🔧", color: "text-purple-600", bg: "bg-purple-50" }
        };

        const taskMap = {
            "78a580c9-ccf4-443c-8acf-063186662570": { title: "Nấu cơm tối", icon: "fa-fire-burner" },
            "ae5bb78a-b123-4cd9-9fae-a9b9327a006a": { title: "Giặt quần áo", icon: "fa-shirt" },
            "6f884c30-3d4b-495e-a24e-e99c8e531f92": { title: "Rửa bát", icon: "fa-sink" },
            "7459f92e-3a4b-449a-9155-27e1029d2437": { title: "Quét nhà", icon: "fa-broom" }
        };

        // Gắn ngày hôm nay làm mặc định
        document.getElementById('dateInput').valueAsDate = new Date();

        async function runAlgorithm() {
            const date = document.getElementById('dateInput').value;
            const btn = document.getElementById('runBtn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            
            // UI State
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang chạy...';
            resultArea.classList.add('hidden', 'opacity-0');
            loading.classList.remove('hidden');

            try {
                // Gọi tới Python API của bạn
                const response = await fetch('http://127.0.0.1:8000/run-algorithm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: date })
                });

                const data = await response.json();
                
                // Render Dữ liệu
                renderWorkload(data.workload_summary);
                renderTasks(data.assigned_data);

                // Hiệu ứng hiện kết quả
                setTimeout(() => {
                    loading.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    setTimeout(() => resultArea.classList.remove('opacity-0'), 50);
                }, 500);

            } catch (error) {
                alert("Lỗi kết nối tới Server. Hãy đảm bảo uvicorn đang chạy!");
                loading.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Phân Công Tự Động';
            }
        }

        function renderWorkload(workload) {
            const grid = document.getElementById('workloadGrid');
            grid.innerHTML = '';
            
            for (const [userId, minutes] of Object.entries(workload)) {
                const user = userMap[userId] || { name: "Người ẩn danh", avatar: "👤", color: "text-slate-600", bg: "bg-slate-100" };
                
                grid.innerHTML += `
                    <div class="glass-card rounded-2xl p-5 flex items-center gap-4 hover:-translate-y-1 transition-transform duration-300">
                        <div class="text-4xl ${user.bg} w-16 h-16 rounded-full flex items-center justify-center shadow-inner">
                            ${user.avatar}
                        </div>
                        <div>
                            <p class="font-semibold text-lg text-slate-800">${user.name}</p>
                            <p class="${user.color} font-medium flex items-center gap-1">
                                <i class="fa-regular fa-clock"></i> ${minutes} phút
                            </p>
                        </div>
                    </div>
                `;
            }
        }

        function renderTasks(assignments) {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            assignments.forEach(assign => {
                const user = userMap[assign.user_id] || { name: "Người ẩn danh", color: "text-slate-600" };
                const task = taskMap[assign.task_id] || { title: "Việc không tên", icon: "fa-clipboard-check" };

                list.innerHTML += `
                    <li class="p-5 flex items-center justify-between hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center">
                                <i class="fa-solid ${task.icon} text-lg"></i>
                            </div>
                            <div>
                                <p class="font-semibold text-slate-800">${task.title}</p>
                                <span class="text-xs font-medium px-2 py-1 bg-slate-100 text-slate-500 rounded-md mt-1 inline-block">
                                    Status: ${assign.status}
                                </span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-slate-500 mb-1">Được giao cho</p>
                            <p class="font-bold ${user.color}">${user.name}</p>
                        </div>
                    </li>
                `;
            });
        }
    </script>
</body>
</html>
