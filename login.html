<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý việc nhà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-grid {
            background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,0.07) 1px, transparent 0);
            background-size: 32px 32px;
        }
        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast-in { animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-out { animation: toastOut 0.3s ease-in forwards; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-50 via-indigo-50/30 to-slate-100 bg-grid">

    <div id="toastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 text-white mb-5 shadow-lg shadow-indigo-200 float-anim">
                <i class="fa-solid fa-house-lock text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Home Task Manager</h1>
            <p class="text-slate-500 text-sm mt-2">Dành cho thành viên trong gia đình</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 border border-slate-100">

            <!-- Tab Switcher -->
            <div class="flex bg-slate-100 rounded-xl p-1 mb-6">
                <button onclick="switchAuthTab('login')" id="tabLogin" class="tab-btn active flex-1 py-2.5 rounded-lg text-sm font-bold transition-all">Đăng nhập</button>
                <button onclick="switchAuthTab('register')" id="tabRegister" class="tab-btn flex-1 py-2.5 rounded-lg text-sm font-bold text-slate-500 transition-all">Đăng ký</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-400"></i>
                        </div>
                        <input type="email" id="loginEmail" required class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors outline-none" placeholder="email@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400 text-sm"></i>
                        </div>
                        <input type="password" id="loginPassword" required class="block w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors outline-none" placeholder="•••••••••">
                        <button type="button" onclick="togglePw('loginPassword', this)" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600">
                            <i id="loginEye" class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-lg shadow-indigo-200 disabled:opacity-60 transition-all">
                    <span id="btnText">Đăng nhập</span>
                    <i id="loadingIcon" class="fa-solid fa-circle-notch fa-spin ml-2 hidden mt-0.5"></i>
                </button>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Họ và tên</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-slate-400"></i>
                        </div>
                        <input type="text" id="regName" required class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors outline-none" placeholder="Nguyễn Văn A">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-400"></i>
                        </div>
                        <input type="email" id="regEmail" required class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors outline-none" placeholder="email@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400 text-sm"></i>
                        </div>
                        <input type="password" id="regPassword" required minlength="6" class="block w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors outline-none" placeholder="Tối thiểu 6 ký tự">
                        <button type="button" onclick="togglePw('regPassword', this)" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600">
                            <i id="regEye" class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="regBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl text-sm font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 shadow-lg shadow-emerald-200 disabled:opacity-60 transition-all">
                    <span id="regBtnText">Tạo tài khoản</span>
                    <i id="regSpin" class="fa-solid fa-circle-notch fa-spin ml-2 hidden"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">Secured by Supabase Auth</p>
    </div>

<script>
    let mySupabase;
    const API = 'https://home-task-manager.onrender.com';

    function showToast(msg, type) {
        var c = document.getElementById('toastContainer');
        var bg = 'bg-slate-700';
        var ic = 'fa-circle-info';
        if (type === 'error') { bg = 'bg-red-500'; ic = 'fa-circle-exclamation'; }
        if (type === 'success') { bg = 'bg-emerald-500'; ic = 'fa-circle-check'; }
        if (type === 'warning') { bg = 'bg-amber-500'; ic = 'fa-triangle-exclamation'; }
        var t = document.createElement('div');
        t.className = 'pointer-events-auto ' + bg + ' text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-in text-sm font-medium';
        t.innerHTML = '<i class="fa-solid ' + ic + ' text-xs opacity-70"></i><span class="flex-1">' + msg + '</span><button onclick="this.parentElement.remove()" class="opacity-50 hover:opacity-100"><i class="fa-solid fa-xmark text-xs"></i></button>';
        c.appendChild(t);
        setTimeout(function() {
            t.classList.add('toast-out');
            setTimeout(function() { t.remove(); }, 200);
        }, 4000);
    }

    function switchAuthTab(tab) {
        document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        if (tab !== 'login') {
            document.getElementById('tabLogin').classList.add('text-slate-500');
        }
        if (tab !== 'register') {
            document.getElementById('tabRegister').classList.remove('text-slate-500');
        } else {
            document.getElementById('tabRegister').classList.add('text-slate-500');
        }
    }

    function togglePw(id, btn) {
        var inp = document.getElementById(id);
        if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="fa-regular fa-eye-slash"></i>'; }
        else { inp.type = 'password'; btn.innerHTML = '<i class="fa-regular fa-eye"></i>'; }
    }

    document.addEventListener('DOMContentLoaded', async function() {
        try {
            var r = await fetch(API + '/api/config');
            var cfg = await r.json();
            mySupabase = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_KEY);

            var user = await mySupabase.auth.getUser();
            if (user && user.data) {
                await delay(1500);
                routeUser(user.data.id);
            }
        } catch (e) {
            console.error(e);
        }
    });

    // *** FIX: Dùng setTimeout thay new Promise ***
    function delay(ms) {
        return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }

    async function routeUser(userId) {
        try {
            // Đợi 1.5 giây để DB cập nhật xong
            await delay(1500);

            var res = await mySupabase.from('profiles')
                .select('role, household_id')
                .eq('id', userId)
                .single();

            // Nếu chưa có nhà → onboarding
            if (!res || !res.data || !res.data.household_id) {
                return window.location.href = 'onboarding.html';
            }

            // Đã có nhà → dashboard theo role
            window.location.href = res.data.role === 'admin' ? 'admin_dashboard.html' : 'user_dashboard.html';
        } catch (e) {
            window.location.href = 'onboarding.html';
        }
    }

    // LOGIN
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var submitBtn = document.getElementById('submitBtn');
        var loadingIcon = document.getElementById('loadingIcon');
        var btnText = document.getElementById('btnText');
        submitBtn.disabled = true;
        loadingIcon.classList.remove('hidden');
        btnText.textContent = 'Đang xác thực...';

        try {
            if (!mySupabase) throw new Error("Chưa kết nối Database!");
            var email = document.getElementById('loginEmail').value;
            var pw = document.getElementById('loginPassword').value;

            var result = await mySupabase.auth.signInWithPassword({
                email: email,
                password: pw
            });

            showToast('Đăng nhập thành công!', 'success');

            await delay(1500);
            await routeUser(result.data.user.id);
        } catch (e) {
            var msg = e.message;
            if (msg === 'Invalid login credentials') { msg = 'Sai email hoặc mật khẩu!'; }
            showToast(msg, 'error');
        } finally {
            submitBtn.disabled = false;
            loadingIcon.classList.add('hidden');
            btnText.textContent = 'Đăng nhập';
        }
    });

    // REGISTER
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var regBtn = document.getElementById('regBtn');
        var regText = document.getElementById('regBtnText');
        var regSpin = document.getElementById('regSpin');
        regBtn.disabled = true;
        regText.classList.add('hidden');
        regSpin.classList.remove('hidden');

        try {
            if (!mySupabase) throw new Error("Chưa kết nối Database!");
            var name = document.getElementById('regName').value.trim();
            var email = document.getElementById('regEmail').value;
            var pw = document.getElementById('regPassword').value;

            if (pw.length < 6) throw new Error("Mật khẩu tối thiểu 6 ký tự!");

            await mySupabase.auth.signUp({ email: email, password: pw });
            showToast('Tạo tài khoản thành công!', 'success');

            await delay(1500);
            await routeUser((await mySupabase.auth.getUser()).data.user.id);
        } catch (e) {
            showToast(e.message, 'error');
        } finally {
            regBtn.disabled = false;
            regText.classList.remove('hidden');
            regSpin.classList.add('hidden');
        }
    });
</script>
</body>
</html>
