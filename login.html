<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý việc nhà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 text-indigo-600 mb-4">
                <i class="fa-solid fa-house-lock text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">Đăng nhập hệ thống</h1>
            <p class="text-slate-500 text-sm mt-2">Dành cho thành viên trong gia đình</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-slate-400"></i>
                    </div>
                    <input type="email" id="email" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 sm:text-sm transition-colors" placeholder="email@nhaminh.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="password" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 sm:text-sm transition-colors" placeholder="••••••••">
                </div>
            </div>

            <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Sai email hoặc mật khẩu!</span>
            </div>

            <button type="submit" id="submitBtn" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                <span>Đăng nhập</span>
                <i id="loadingIcon" class="fa-solid fa-circle-notch fa-spin ml-2 hidden mt-0.5"></i>
            </button>
        </form>
    </div>

<script>
        let mySupabase; // Đổi tên để tránh lỗi F12
        
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingIcon = document.getElementById('loadingIcon');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // 1. TỰ ĐỘNG XIN KEY TỪ PYTHON KHI MỞ TRANG
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('https://home-task-manager.onrender.com/api/config');
                const config = await response.json();
                mySupabase = supabase.createClient(config.SUPABASE_URL, config.SUPABASE_KEY);
            } catch (error) {
                console.error("Lỗi:", error);
                alert("Không thể kết nối Backend. Hãy đảm bảo uvicorn đang chạy!");
            }
        });

        // 2. XỬ LÝ KHI BẤM NÚT ĐĂNG NHẬP
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Ngăn web reload lại
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            loadingIcon.classList.remove('hidden');
            errorMessage.classList.add('hidden');

            try {
                if (!mySupabase) throw new Error("Chưa kết nối được Database!");

                // Gọi API Đăng nhập của Supabase
                const { data: authData, error: authError } = await mySupabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (authError) throw authError;

                // Lấy Role (chức vụ) để biết nên đẩy đi đâu
                const { data: profileData, error: profileError } = await mySupabase
                    .from('profiles')
                    .select('role')
                    .eq('id', authData.user.id)
                    .single();

                if (profileError) throw profileError;

                // TỰ ĐỘNG CHUYỂN TRANG (Phép màu ở đây)
                if (profileData.role === 'admin') {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    window.location.href = 'user_dashboard.html';
                }

            } catch (error) {
                errorMessage.classList.remove('hidden');
                errorText.textContent = error.message === 'Invalid login credentials' 
                    ? 'Sai email hoặc mật khẩu!' 
                    : error.message;
            } finally {
                submitBtn.disabled = false;
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
